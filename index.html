<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facebook Tutorial Video Categories</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700;800&display=swap"
      rel="stylesheet" />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="fb-root"></div>

    <script>
      window.fbSdkReady = false;
      window.fbAsyncInit = function () {
        window.fbSdkReady = true;
        if (window.onFacebookSdkReady) {
          window.onFacebookSdkReady();
        }
      };
    </script>

    <script
      async
      defer
      crossorigin="anonymous"
      src="https://connect.facebook.net/en_US/sdk.js#xfbml=1&version=v23.0"></script>

    <div class="min-h-screen">
      <header
        class="sticky top-0 z-40 border-b border-slate-200 bg-white/90 backdrop-blur">
        <div class="mx-auto max-w-7xl px-4 py-3">
          <div
            class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
            <div>
              <h1 class="text-xl font-extrabold text-slate-900 md:text-2xl">
                ভিডিও টিউটোরিয়াল
              </h1>
              <p class="text-sm text-slate-500">
                ক্যাটাগরি অনুযায়ী সাজানো Facebook ভিডিও
              </p>
            </div>

            <div class="w-full md:w-80">
              <label for="searchInput" class="sr-only">ভিডিও খুঁজুন</label>

              <div class="relative">
                <input
                  id="searchInput"
                  type="text"
                  placeholder="ভিডিও খুঁজুন..."
                  class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 pr-12 text-sm outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200" />

                <button
                  id="clearSearchBtn"
                  type="button"
                  class="hidden absolute right-3 top-1/2 -translate-y-1/2 h-8 w-8 rounded-full bg-slate-200 text-slate-700 text-lg leading-none hover:bg-slate-300"
                  aria-label="সার্চ ক্লিয়ার করুন">
                  ×
                </button>
              </div>
            </div>
          </div>
        </div>
      </header>

      <main class="mx-auto max-w-7xl p-4">
        <div class="grid grid-cols-1 gap-4 xl:grid-cols-12">
          <aside class="xl:col-span-3">
            <div
              class="sidebar-shell rounded-[28px] bg-violet-200 p-5 shadow-sm">
              <h2 class="mb-4 text-2xl font-extrabold text-slate-900">
                ক্যাটাগরি
              </h2>

              <div id="categoryList" class="grid grid-cols-2 gap-4"></div>

              <div class="mt-6 mb-3 flex items-center justify-between">
                <h3 class="text-lg font-semibold text-slate-800">
                  ভিডিও তালিকা
                </h3>
                <span
                  id="videoCount"
                  class="rounded-full bg-white/70 px-4 py-1 text-sm font-medium text-slate-700"
                  >0 টি</span
                >
              </div>

              <div id="videoList" class="video-list-scroll space-y-3"></div>
            </div>
          </aside>

          <section class="xl:col-span-9">
            <div
              class="preview-shell rounded-[28px] bg-white p-4 shadow-sm md:p-6">
              <div id="previewBox" class="preview-box">
                <div class="preview-empty">
                  <div>
                    <div class="mb-3 text-5xl">🎬</div>
                    <h3 class="text-2xl font-bold text-slate-900">
                      ভিডিও প্রিভিউ
                    </h3>
                    <p class="mt-2 text-slate-500">
                      বাম পাশ থেকে একটি ভিডিও সিলেক্ট করুন
                    </p>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <div
      id="videoModal"
      class="fixed inset-0 z-50 hidden items-end justify-center bg-slate-950/70 p-0 md:p-4"
      aria-hidden="true">
      <div
        class="modal-panel h-[94dvh] w-full overflow-hidden rounded-t-[28px] bg-white shadow-2xl md:h-auto md:max-h-[92vh] md:max-w-5xl md:rounded-[28px]"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalTitle">
        <div
          class="flex items-center justify-between border-b border-slate-200 px-4 py-3 md:px-6">
          <div>
            <h3 id="modalTitle" class="text-lg font-bold text-slate-900">
              ভিডিও দেখুন আর শিখুন
            </h3>
            <p class="text-sm text-slate-500">
              প্রতিদিন ভিডিও পেতে আমাকে ফলো দিয়ে রাখুন
            </p>
          </div>

          <button
            id="closeModalBtn"
            type="button"
            class="inline-flex h-11 w-11 items-center justify-center rounded-full bg-slate-100 text-2xl text-slate-700 transition hover:bg-slate-200"
            aria-label="মডাল বন্ধ করুন">
            ×
          </button>
        </div>

        <div id="modalContent" class="modal-scroll overflow-y-auto p-4 md:p-6">
          <div class="preview-empty min-h-[320px]">
            <div>
              <div class="mb-3 text-5xl">🎬</div>
              <p class="text-slate-500">এখানে ভিডিও লোড হবে</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="premium-ticker" id="premiumTicker">
      <div class="premium-ticker-label">
        <span class="premium-live-dot"></span>
        <span>নোটিশ</span>
      </div>

      <div class="premium-ticker-marquee">
        <div class="premium-ticker-track" id="noticeTrack"></div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
